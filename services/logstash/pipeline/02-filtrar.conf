filter {
  # Si la respuesta tiene un campo "films" que es un array, lo dividimos
  if [films] {
    split {
      field => "films"
    }
    
    # Movemos los campos de "films" al nivel raíz
    mutate {
      rename => { "[films][id]" => "film_id" }
      rename => { "[films][title]" => "title" }
      rename => { "[films][overview]" => "overview" }
      rename => { "[films][release_date]" => "release_date" }
      rename => { "[films][vote_average]" => "vote_average" }
      rename => { "[films][vote_count]" => "vote_count" }
      rename => { "[films][popularity]" => "popularity" }
      rename => { "[films][poster_path]" => "poster_path" }
      rename => { "[films][backdrop_path]" => "backdrop_path" }
      rename => { "[films][original_language]" => "original_language" }
      rename => { "[films][original_title]" => "original_title" }
      rename => { "[films][genre_ids]" => "genre_ids" }
      rename => { "[films][adult]" => "adult" }
      rename => { "[films][video]" => "video" }
    }
    
    # Segundo paso: eliminar todos los campos no deseados
    mutate {
      remove_field => [ 
        "films", 
        "http_poller_metadata", 
        "total", 
        "@version", 
        "host", 
        "headers",
        "event"
      ]
    }
  }
}
